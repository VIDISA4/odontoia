<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdontoIA — Nomenclatura Dental</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:      #1a3c6e;
      --azul-claro:#2563b0;
      --verde:     #16a34a;
      --rojo:      #dc2626;
      --gris-bg:   #f1f5f9;
      --gris-borde:#cbd5e1;
      --texto:     #1e293b;
      --texto-sub: #64748b;
      --blanco:    #ffffff;
      --radio:     14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gris-bg);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--azul);
      text-align: center;
      margin-bottom: 6px;
    }
    .logo span { color: var(--azul-claro); }

    .subtitulo {
      text-align: center;
      color: var(--texto-sub);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .card {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    /* LOGIN */
    #pantalla-login h2 { font-size: 1.15rem; margin-bottom: 22px; color: var(--azul); }
    .campo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .campo label { font-size: 0.8rem; font-weight: 600; color: var(--texto-sub); text-transform: uppercase; letter-spacing: .05em; }
    .campo input { border: 1.5px solid var(--gris-borde); border-radius: 8px; padding: 12px 14px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border .2s; }
    .campo input:focus { border-color: var(--azul-claro); }
    .error-msg { color: var(--rojo); font-size: 0.85rem; margin-bottom: 12px; display: none; }

    /* BOTONES */
    .btn-primary { width: 100%; background: var(--azul); color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 1rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; }
    .btn-primary:hover  { background: var(--azul-claro); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { background: var(--gris-borde); cursor: not-allowed; }
    .btn-secondary { width: 100%; background: none; border: 2px solid var(--azul); color: var(--azul); border-radius: 8px; padding: 12px; font-size: 0.95rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: background .2s, color .2s; }
    .btn-secondary:hover { background: var(--azul); color: #fff; }

    /* HEADER EJERCICIO */
    .ej-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .usuario-chip { display: flex; align-items: center; gap: 6px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 99px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; color: var(--azul-claro); }
    .btn-salir { background: none; border: none; color: var(--texto-sub); font-size: 0.82rem; cursor: pointer; font-family: inherit; text-decoration: underline; }
    .btn-salir:hover { color: var(--rojo); }

    /* PROGRESO */
    .progreso-wrap { margin-bottom: 20px; }
    .progreso-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--texto-sub); margin-bottom: 6px; }
    .barra-fondo { background: var(--gris-bg); border-radius: 99px; height: 7px; overflow: hidden; }
    .barra-relleno { background: var(--azul-claro); height: 100%; border-radius: 99px; transition: width .4s ease; }

    .tag-sistema { display: inline-block; background: #eff6ff; color: var(--azul-claro); border: 1px solid #bfdbfe; border-radius: 99px; font-size: 0.75rem; font-weight: 700; padding: 3px 10px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em; }

    .enunciado { font-size: 1rem; font-weight: 500; line-height: 1.55; margin-bottom: 18px; }

    /* IMAGEN */
    .img-wrap { background: var(--gris-bg); border: 1.5px solid var(--gris-borde); border-radius: 10px; overflow: hidden; margin-bottom: 20px; min-height: 200px; display: flex; align-items: center; justify-content: center; }
    .img-wrap img { max-width: 100%; height: auto; max-height: none; object-fit: contain; display: block; }

    /* ALTERNATIVAS */
    .alternativas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .alt-btn { background: var(--blanco); border: 2px solid var(--gris-borde); border-radius: 10px; padding: 14px 10px; font-size: 1rem; font-family: inherit; font-weight: 600; color: var(--texto); cursor: pointer; transition: border .15s, background .15s, transform .1s; }
    .alt-btn:hover:not(:disabled) { border-color: var(--azul-claro); background: #eff6ff; transform: translateY(-1px); }
    .alt-btn:disabled { cursor: not-allowed; }
    .alt-btn.correcta  { border-color: var(--verde); background: #dcfce7; color: var(--verde); }
    .alt-btn.incorrecta{ border-color: var(--rojo);  background: #fee2e2; color: var(--rojo);  }

    /* FEEDBACK */
    .feedback { border-radius: 10px; padding: 14px 16px; font-size: 0.9rem; line-height: 1.55; margin-bottom: 18px; display: none; animation: fadeIn .25s ease; }
    .feedback.correcto  { background: #dcfce7; border-left: 4px solid var(--verde); color: #166534; }
    .feedback.incorrecto{ background: #fee2e2; border-left: 4px solid var(--rojo);  color: #991b1b; }
    .feedback-titulo    { font-weight: 700; margin-bottom: 4px; }

    /* RESULTADOS */
    #pantalla-resultados { text-align: center; }
    .res-icono  { font-size: 3.5rem; margin-bottom: 12px; }
    .res-titulo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--azul); margin-bottom: 6px; }
    .res-puntaje { font-size: 2.8rem; font-weight: 700; color: var(--azul-claro); margin: 14px 0; }
    .res-puntaje span { font-size: 1.1rem; color: var(--texto-sub); font-weight: 400; }
    .detalle-wrap { text-align: left; margin: 18px 0; border-top: 1px solid var(--gris-borde); padding-top: 16px; }
    .detalle-titulo { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--texto-sub); margin-bottom: 12px; }
    .item-resultado { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gris-bg); font-size: 0.88rem; }
    .badge { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; flex-shrink: 0; margin-top: 1px; }
    .badge.ok  { background: #dcfce7; color: var(--verde); }
    .badge.mal { background: #fee2e2; color: var(--rojo);  }
    .acciones-resultado { display: flex; gap: 10px; margin-top: 20px; }
    .acciones-resultado button { flex: 1; }

    .udd-badge { margin-top: 20px; font-size: 0.75rem; color: var(--texto-sub); text-align: center; }

    .pantalla        { display: none; }
    .pantalla.activa { display: block; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

  <div class="logo">Odonto<span>IA</span></div>
  <p class="subtitulo">Ejercicios de nomenclatura dental · UDD Concepción</p>

  <!-- LOGIN -->
  <div class="card pantalla activa" id="pantalla-login">
    <h2>Ingresa tus datos para comenzar</h2>
    <div class="campo">
      <label>Usuario</label>
      <input type="text" id="input-usuario"
             placeholder="Tu correo sin @udd.cl"
             onkeydown="if(event.key==='Enter') document.getElementById('input-pass').focus()">
    </div>
    <div class="campo">
      <label>Contraseña</label>
      <input type="password" id="input-pass"
             placeholder="Contraseña entregada por tu docente"
             onkeydown="if(event.key==='Enter') iniciarSesion()">
    </div>
    <p class="error-msg" id="error-login"></p>
    <button class="btn-primary" id="btn-login" onclick="iniciarSesion()">Entrar →</button>
  </div>

  <!-- EJERCICIO -->
  <div class="card pantalla" id="pantalla-ejercicio">
    <div class="ej-header">
      <div class="usuario-chip">👤 <span id="chip-usuario"></span></div>
      <button class="btn-salir" onclick="salir()">Cerrar sesión</button>
    </div>
    <div class="progreso-wrap">
      <div class="progreso-label">
        <span id="lbl-pregunta">Pregunta 1 de 3</span>
        <span id="lbl-score">0 correctas</span>
      </div>
      <div class="barra-fondo">
        <div class="barra-relleno" id="barra" style="width:0%"></div>
      </div>
    </div>
    <div class="tag-sistema" id="tag-sistema">FDI</div>
    <p class="enunciado" id="enunciado"></p>
    <div class="img-wrap" id="img-wrap"></div>
    <div class="alternativas" id="alternativas"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-titulo" id="feedback-titulo"></div>
      <div id="feedback-texto"></div>
    </div>
    <button class="btn-primary" id="btn-siguiente"
            style="display:none" onclick="siguienteEjercicio()">
      Siguiente pregunta →
    </button>
  </div>

  <!-- RESULTADOS -->
  <div class="card pantalla" id="pantalla-resultados">
    <div class="res-icono" id="res-icono">🦷</div>
    <div class="res-titulo" id="res-titulo">¡Sesión completada!</div>
    <p style="color:var(--texto-sub);font-size:.9rem;margin-top:4px" id="res-alumno"></p>
    <div class="res-puntaje" id="res-puntaje">0 <span>/ 0 correctas</span></div>
    <div class="detalle-wrap">
      <div class="detalle-titulo">Detalle de respuestas</div>
      <div id="lista-detalle"></div>
    </div>
    <div class="acciones-resultado">
      <button class="btn-secondary" onclick="reiniciar()">↺ Intentar de nuevo</button>
      <button class="btn-primary"   onclick="salir()">Cerrar sesión</button>
    </div>
  </div>

  <p class="udd-badge">
    Imágenes obtenidas de sitios web públicos · Universidad del Desarrollo
  </p>

<script>
/* ══════════════════════════════════════════════════
   EJERCICIOS — proporcionados por Pía Moreno y Carol Senn
   ══════════════════════════════════════════════════ */
const BASE_IMG = "https://raw.githubusercontent.com/VIDISA4/odontoia/main/";

const ejercicios = [
  {
    sistema:      "FDI",
    enunciado:    "Observe la imagen. Seleccione la alternativa que corresponde al diente señalado con la flecha, según el sistema de nomenclatura FDI.",
    imagen:       BASE_IMG + "Ejercicio%201.png",
    alternativas: ["2.4", "1.4", "3.5", "3.4"],
    correcta:     "2.4",
    fb_correcto:   "¡Correcto! El diente señalado corresponde al 2.4 según la nomenclatura FDI. Este es el primer premolar del cuadrante superior izquierdo. En FDI el cuadrante 2 corresponde al maxilar superior izquierdo, y el dígito 4 indica el primer premolar.",
    fb_incorrecto: "Incorrecto. La respuesta correcta es 2.4. Este diente corresponde al primer premolar del cuadrante superior izquierdo. Recuerda que en FDI el cuadrante 2 es el maxilar superior izquierdo, y el número 4 indica el primer premolar."
  },
  {
    sistema:      "FDI",
    enunciado:    "Observe la imagen. Seleccione la alternativa que corresponde al diente señalado con la flecha, según el sistema de nomenclatura FDI.",
    imagen:       BASE_IMG + "Ejercicio%202.png",
    alternativas: ["3.2", "1.2", "2.1", "2.2"],
    correcta:     "2.2",
    fb_correcto:   "¡Correcto! El diente señalado corresponde al 2.2 según la nomenclatura FDI. Este es el incisivo lateral del cuadrante superior izquierdo. En FDI el cuadrante 2 es el maxilar superior izquierdo, y el número 2 indica el incisivo lateral.",
    fb_incorrecto: "Incorrecto. La respuesta correcta es 2.2. Este diente es el incisivo lateral superior izquierdo. En FDI el cuadrante 2 corresponde al maxilar superior izquierdo, y el número 2 indica el incisivo lateral."
  },
  {
    sistema:      "FDI / ADA",
    enunciado:    "Observe la imagen. Seleccione la alternativa correcta para el diente señalado con la flecha, considerando el sistema de nomenclatura indicado.",
    imagen:       BASE_IMG + "Ejercicio%203.png",
    alternativas: ["ADA 20", "ADA 29", "FDI 3.5", "FDI 4.4"],
    correcta:     "ADA 20",
    fb_correcto:   "¡Correcto! El diente señalado corresponde al número 20 según el sistema ADA (Universal). En el sistema ADA la numeración va del 1 al 32 en sentido horario comenzando por el tercer molar superior derecho. El diente 20 corresponde al segundo premolar inferior izquierdo.",
    fb_incorrecto: "Incorrecto. La respuesta correcta es ADA 20. En el sistema ADA la numeración va del 1 al 32 en sentido horario. El diente señalado es el segundo premolar inferior izquierdo, que corresponde al número 20 en este sistema."
  }
];

/* ══════════════════════════════════════════════════
   ESTADO
   ══════════════════════════════════════════════════ */
let usuarios      = [];
let usuarioActual = "";
let indice        = 0;
let puntaje       = 0;
let historial     = [];
let respondido    = false;
let intentoNum    = 0;

/* ══════════════════════════════════════════════════
   CARGA DE USUARIOS DESDE usuarios.json
   ══════════════════════════════════════════════════ */
async function cargarUsuarios() {
  try {
    const resp = await fetch('usuarios.json');
    usuarios   = await resp.json();
  } catch(e) {
    console.error("No se pudo cargar usuarios.json:", e);
    usuarios = [{ usuario: "vidiazs", password: "UDD2026" }];
  }
}

/* ══════════════════════════════════════════════════
   NAVEGACIÓN
   ══════════════════════════════════════════════════ */
function mostrarPantalla(id) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  document.getElementById(id).classList.add('activa');
}

/* ══════════════════════════════════════════════════
   LOGIN
   ══════════════════════════════════════════════════ */
async function iniciarSesion() {
  const inputUsr  = document.getElementById('input-usuario').value.trim().toLowerCase();
  const inputPass = document.getElementById('input-pass').value.trim();
  const errEl     = document.getElementById('error-login');
  const btnLogin  = document.getElementById('btn-login');

  if (usuarios.length === 0) {
    btnLogin.disabled    = true;
    btnLogin.textContent = "Cargando...";
    await cargarUsuarios();
    btnLogin.disabled    = false;
    btnLogin.textContent = "Entrar →";
  }

  const encontrado = usuarios.find(
    u => u.usuario === inputUsr && u.password === inputPass
  );

  if (!encontrado) {
    errEl.textContent   = "Usuario o contraseña incorrectos. Verifica con tu docente.";
    errEl.style.display = "block";
    return;
  }

  errEl.style.display = "none";
  usuarioActual       = encontrado.usuario;
  iniciarIntento();
}

/* ══════════════════════════════════════════════════
   INICIAR INTENTO
   ══════════════════════════════════════════════════ */
function iniciarIntento() {
  intentoNum++;
  indice     = 0;
  puntaje    = 0;
  historial  = [];
  respondido = false;
  document.getElementById('chip-usuario').textContent = usuarioActual;
  mostrarPantalla('pantalla-ejercicio');
  renderEjercicio();
}

/* ══════════════════════════════════════════════════
   RENDERIZAR EJERCICIO
   ══════════════════════════════════════════════════ */
function renderEjercicio() {
  respondido  = false;
  const ej    = ejercicios[indice];
  const total = ejercicios.length;

  document.getElementById('lbl-pregunta').textContent = `Pregunta ${indice+1} de ${total}`;
  document.getElementById('lbl-score').textContent    = `${puntaje} correcta${puntaje!==1?'s':''}`;
  document.getElementById('barra').style.width        = `${(indice/total)*100}%`;
  document.getElementById('tag-sistema').textContent  = ej.sistema;
  document.getElementById('enunciado').textContent    = ej.enunciado;

  // Imagen
  const imgWrap = document.getElementById('img-wrap');
  imgWrap.innerHTML = `<img src="${ej.imagen}" alt="Ejercicio ${indice+1}"
    onerror="this.parentElement.innerHTML='<p style=color:var(--texto-sub);padding:20px;text-align:center>Imagen no disponible aún</p>'">`;

  // Alternativas en orden aleatorio
  const divAlt = document.getElementById('alternativas');
  divAlt.innerHTML = '';
  [...ej.alternativas].sort(() => Math.random() - .5).forEach(alt => {
    const btn       = document.createElement('button');
    btn.className   = 'alt-btn';
    btn.textContent = alt;
    btn.onclick     = () => responder(alt, btn, ej);
    divAlt.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.style.display = 'none';
  document.getElementById('btn-siguiente').style.display = 'none';
}

/* ══════════════════════════════════════════════════
   RESPONDER
   ══════════════════════════════════════════════════ */
function responder(seleccion, botonPresionado, ej) {
  if (respondido) return;
  respondido = true;

  const esCorrecta = seleccion === ej.correcta;
  if (esCorrecta) puntaje++;

  document.getElementById('lbl-score').textContent =
    `${puntaje} correcta${puntaje!==1?'s':''}`;

  document.querySelectorAll('.alt-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === ej.correcta)        btn.classList.add('correcta');
    if (btn === botonPresionado && !esCorrecta) btn.classList.add('incorrecta');
  });

  historial.push({
    pregunta:  `Pregunta ${indice+1} (${ej.sistema})`,
    seleccion,
    correcta:  ej.correcta,
    ok:        esCorrecta
  });

  const fb = document.getElementById('feedback');
  fb.className     = `feedback ${esCorrecta?'correcto':'incorrecto'}`;
  fb.style.display = 'block';
  document.getElementById('feedback-titulo').textContent =
    esCorrecta ? '✓ ¡Correcto!' : '✗ Incorrecto';
  document.getElementById('feedback-texto').textContent =
    esCorrecta ? ej.fb_correcto : ej.fb_incorrecto;

  const btnSig     = document.getElementById('btn-siguiente');
  btnSig.style.display = 'block';
  btnSig.textContent   = indice+1 < ejercicios.length
    ? 'Siguiente pregunta →' : 'Ver mis resultados →';
}

/* ══════════════════════════════════════════════════
   SIGUIENTE / RESULTADOS / REINICIAR / SALIR
   ══════════════════════════════════════════════════ */
function siguienteEjercicio() {
  indice++;
  indice < ejercicios.length ? renderEjercicio() : mostrarResultados();
}

function mostrarResultados() {
  const total = ejercicios.length;
  const pct   = Math.round((puntaje/total)*100);

  document.getElementById('res-icono').textContent  = pct>=80?"🏆":pct>=50?"💪":"📚";
  document.getElementById('res-titulo').textContent =
    pct>=80 ? "¡Excelente trabajo!"
    : pct>=50 ? "¡Buen intento, sigue practicando!"
    : "Sigue practicando, ¡vas a lograrlo!";
  document.getElementById('res-alumno').textContent = usuarioActual;
  document.getElementById('res-puntaje').innerHTML  =
    `${puntaje} <span>/ ${total} correcta${total!==1?'s':''} (${pct}%)</span>`;

  const lista = document.getElementById('lista-detalle');
  lista.innerHTML = '';
  historial.forEach((h,i) => {
    const div = document.createElement('div');
    div.className = 'item-resultado';
    div.innerHTML = `
      <div class="badge ${h.ok?'ok':'mal'}">${h.ok?'✓':'✗'}</div>
      <div>
        <div style="font-weight:600">${h.pregunta}</div>
        <div style="color:var(--texto-sub);font-size:.82rem;margin-top:2px">
          Tu respuesta: <strong>${h.seleccion}</strong>
          ${!h.ok?` · Correcta: <strong>${h.correcta}</strong>`:''}
        </div>
      </div>`;
    lista.appendChild(div);
  });

  enviarAForms(puntaje, total - puntaje, total, pct);
  mostrarPantalla('pantalla-resultados');
}

function reiniciar() { iniciarIntento(); }

/* ══════════════════════════════════════════════════
   ENVIAR DATOS A MICROSOFT FORMS
   Forms → Power Automate → Excel SharePoint
   ══════════════════════════════════════════════════ */
function enviarAForms(correctas, incorrectas, total, porcentaje) {
  try {
    const ahora = new Date();
    const fecha = ahora.toLocaleDateString("es-CL");
    const hora  = ahora.toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit", second:"2-digit" });

    const FORMS_URL = "https://forms.office.com/Pages/ResponsePage.aspx?id=J4nXtdAlqUSDcNhuV8e6lpUEVbVXxktNloqFF6LW3OxUMlJOTDJJRURETjRRRDJZMUxFRkNVWVBEWS4u";

    const params = new URLSearchParams({
      r1c1: usuarioActual,
      r2c1: fecha,
      r3c1: hora,
      r4c1: String(intentoNum),
      r5c1: String(correctas),
      r6c1: String(incorrectas),
      r7c1: String(total),
      r8c1: String(porcentaje) + "%"
    });

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = FORMS_URL + "&" + params.toString();
    document.body.appendChild(iframe);
    setTimeout(() => { if (iframe.parentNode) iframe.parentNode.removeChild(iframe); }, 5000);

  } catch(e) {
    console.warn("No se pudo enviar a Forms:", e);
  }
}

function salir() {
  usuarioActual = "";
  document.getElementById('input-usuario').value = '';
  document.getElementById('input-pass').value    = '';
  mostrarPantalla('pantalla-login');
}

/* ══════════════════════════════════════════════════
   INICIO
   ══════════════════════════════════════════════════ */
cargarUsuarios();
</script>
</body>
</html>
